<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>X01</title>

<style>

:root{
--bg:#111827;
--card:#1f2937;
--text:#fff;
--red:#dc2626;
}

body{
background:var(--bg);
color:var(--text);
font-family:Arial,sans-serif;
padding:20px;
padding-bottom:100px;
}

.card{
background:var(--card);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.rest{
font-size:90px;
font-weight:bold;
text-align:center;
}

input,select,button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:18px;
}

button{
background:var(--red);
color:white;
}

.checkout{
font-size:24px;
text-align:center;
margin-top:10px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0f172a;
display:flex;
justify-content:space-around;
padding:15px;
}

.nav a{
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<h1>🎯 X01</h1>

<div class="card">

<label>Startscore</label>

<select id="startScore">
<option>301</option>
<option selected>501</option>
<option>701</option>
</select>

<label>Out-Regel</label>

<select id="outRule">
<option value="double">Double Out</option>
<option value="straight">Straight Out</option>
</select>

<button onclick="newLeg()">Neues Leg</button>

</div>

<div class="card">

<div style="text-align:center;">
REST
</div>

<div id="remaining" class="rest">
501
</div>

<div id="checkout" class="checkout">
-
</div>

</div>

<div class="card">

<input
id="scoreInput"
type="number"
min="0"
max="180"
placeholder="Score eingeben">

<button onclick="submitScore()">
Eintragen
</button>

<button onclick="undo()">
Undo
</button>

</div>

<div class="card">

<h3>Statistik</h3>

<p>Average: <span id="avg">0.00</span></p>
<p>Aufnahmen: <span id="visits">0</span></p>
<p>100+: <span id="s100">0</span></p>
<p>140+: <span id="s140">0</span></p>
<p>180: <span id="s180">0</span></p>

</div>

<div class="nav">
<a href="index.html">🏠</a>
<a href="stats.html">📊</a>
<a href="settings.html">⚙️</a>
</div>

<script>

let game={};

function checkoutHint(score){

const map={
170:"T20 T20 Bull",
167:"T20 T19 Bull",
164:"T20 T18 Bull",
161:"T20 T17 Bull",
160:"T20 T20 D20",
158:"T20 T20 D19",
156:"T20 T20 D18",
100:"T20 D20",
80:"T20 D10",
60:"20 D20",
50:"10 D20",
40:"D20",
32:"D16"
};

return map[score] || "";
}

function newLeg(){

let start=
parseInt(
document.getElementById("startScore").value
);

game={
remaining:start,
scores:[]
};

render();
}

function submitScore(){

let score=
parseInt(
document.getElementById("scoreInput").value
);

if(isNaN(score)) return;

let after=
game.remaining-score;

if(after<0){
alert("Bust");
return;
}

game.remaining=after;
game.scores.push(score);

if(after===0){
alert("Leg gewonnen!");
}

render();

document.getElementById("scoreInput").value="";
}

function undo(){

if(game.scores.length===0) return;

let last=
game.scores.pop();

game.remaining+=last;

render();
}

function render(){

document.getElementById("remaining")
.textContent=game.remaining;

document.getElementById("checkout")
.textContent=
checkoutHint(game.remaining);

let total=
game.scores.reduce((a,b)=>a+b,0);

let avg=
game.scores.length
? total/game.scores.length
:0;

document.getElementById("avg")
.textContent=avg.toFixed(2);

document.getElementById("visits")
.textContent=game.scores.length;

document.getElementById("s100")
.textContent=
game.scores.filter(x=>x>=100).length;

document.getElementById("s140")
.textContent=
game.scores.filter(x=>x>=140).length;

document.getElementById("s180")
.textContent=
game.scores.filter(x=>x===180).length;

}

newLeg();

</script>

</body>
</html>
