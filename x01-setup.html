<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>X01 Setup</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#dc2626;
--text:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
padding:20px;
padding-bottom:100px;
}

h1{
margin-bottom:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:20px;
font-size:16px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-size:18px;
font-weight:bold;
}

.nav{
position:fixed;
left:0;
right:0;
bottom:0;
background:#111827;
display:flex;
justify-content:space-around;
padding:15px;
border-top:1px solid #333;
}

.nav a{
text-decoration:none;
color:white;
font-size:18px;
}

.info{
opacity:.8;
font-size:14px;
margin-top:-12px;
margin-bottom:20px;
}

</style>
</head>

<body>

<h1>🎯 X01 konfigurieren</h1>

<div class="card">

<label>Startscore</label>

<select id="startScore">
<option value="301">301</option>
<option value="501" selected>501</option>
<option value="701">701</option>
</select>

<label>Out-Regel</label>

<select id="outRule">
<option value="double" selected>Double Out</option>
<option value="straight">Straight Out</option>
</select>

<div class="info">
Double Out wird später im Wurf-Modus vollständig geprüft.
</div>

<label>Eingabemodus</label>

<select id="inputMode">
<option value="score" selected>Score-Modus</option>
<option value="throw">Wurf-Modus</option>
</select>

<div class="info">
Score-Modus = schnelle Eingabe der Aufnahme<br>
Wurf-Modus = Dart für Dart erfassen
</div>

<label>Legs</label>

<select id="legs">
<option value="3">Best of 3</option>
<option value="5" selected>Best of 5</option>
<option value="7">Best of 7</option>
<option value="9">Best of 9</option>
</select>

<label>Sets</label>

<select id="sets">
<option value="1" selected>1 Set</option>
<option value="3">Best of 3 Sets</option>
<option value="5">Best of 5 Sets</option>
</select>

<button onclick="startGame()">
Spiel starten
</button>

</div>

<div class="nav">
<a href="index.html">🏠</a>
<a href="stats.html">📊</a>
<a href="settings.html">⚙️</a>
</div>

<script>

function startGame(){

const config = {

startScore:
parseInt(
document.getElementById("startScore").value
),

outRule:
document.getElementById("outRule").value,

inputMode:
document.getElementById("inputMode").value,

legs:
parseInt(
document.getElementById("legs").value
),

sets:
parseInt(
document.getElementById("sets").value
)

};

localStorage.setItem(
"gameConfig",
JSON.stringify(config)
);

window.location.href =
"x01.html";

}

</script>

</body>
</html>
