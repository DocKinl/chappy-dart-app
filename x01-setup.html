<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>X01 Setup</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#dc2626;
--text:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
padding:20px;
padding-bottom:100px;
}

h1{
margin-bottom:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

select,input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:16px;
font-size:16px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-size:18px;
font-weight:bold;
}

.nav{
position:fixed;
left:0;
right:0;
bottom:0;
background:#111827;
display:flex;
justify-content:space-around;
padding:15px;
border-top:1px solid #333;
}

.nav a{
text-decoration:none;
color:white;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<h1>🎯 X01 konfigurieren</h1>

<div class="card">

<label>Spielmodus</label>

<select id="gameMode" onchange="updateMode()">
<option value="solo">Solo</option>
<option value="vs">2 Spieler</option>
<option value="ai">Gegen KI</option>
</select>

<label>Spieler 1</label>
<input id="player1" value="Spieler 1">

<div id="player2Container" class="hidden">

<label>Spieler 2</label>
<input id="player2" value="Spieler 2">

</div>

<div id="aiContainer" class="hidden">

<label>KI-Stärke</label>

<select id="aiLevel">
<option>Anfänger</option>
<option>Fortgeschritten</option>
<option>Vereinsspieler</option>
</select>

</div>

<label>Startscore</label>

<select id="startScore">
<option>301</option>
<option selected>501</option>
<option>701</option>
</select>

<label>Out-Regel</label>

<select id="outRule">
<option value="double">Double Out</option>
<option value="straight">Straight Out</option>
</select>

<label>Eingabemodus</label>

<select id="inputMode">
<option value="score">Score-Modus</option>
<option value="throw">Wurf-Modus</option>
</select>

<label>Legs</label>

<select id="legs">
<option>3</option>
<option selected>5</option>
<option>7</option>
<option>9</option>
</select>

<label>Sets</label>

<select id="sets">
<option selected>1</option>
<option>3</option>
<option>5</option>
</select>

<button onclick="startGame()">
Spiel starten
</button>

</div>

<div class="nav">
<a href="index.html">🏠</a>
<a href="stats.html">📊</a>
<a href="settings.html">⚙️</a>
</div>

<script>

function updateMode(){

const mode =
document.getElementById("gameMode").value;

document
.getElementById("player2Container")
.classList.add("hidden");

document
.getElementById("aiContainer")
.classList.add("hidden");

if(mode==="vs"){

document
.getElementById("player2Container")
.classList.remove("hidden");

}

if(mode==="ai"){

document
.getElementById("aiContainer")
.classList.remove("hidden");

}

}

function startGame(){

const config = {

gameMode:
document.getElementById("gameMode").value,

player1:
document.getElementById("player1").value,

player2:
document.getElementById("player2").value,

aiLevel:
document.getElementById("aiLevel").value,

startScore:
parseInt(
document.getElementById("startScore").value
),

outRule:
document.getElementById("outRule").value,

inputMode:
document.getElementById("inputMode").value,

legs:
parseInt(
document.getElementById("legs").value
),

sets:
parseInt(
document.getElementById("sets").value
)

};

localStorage.setItem(
"gameConfig",
JSON.stringify(config)
);

window.location.href="x01.html";

}

updateMode();

</script>

</body>
</html>
